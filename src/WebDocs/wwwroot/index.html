<!DOCTYPE html>
<html>
<head>
    <script src="/drapo.js"></script>
    <link href="/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/theme.css" rel="stylesheet" />
    <link href="/css/todo.css" rel="stylesheet" />
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-143277263-1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'UA-143277263-1');
    </script>
    <script>
        (function () {
            var stored = localStorage.getItem('drapo-docs-theme');
            var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();

        function drapoApplyThemeUI(theme) {
            var icon = document.getElementById('drapo-theme-icon');
            var btn = document.querySelector('.theme-toggle');
            if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
            if (btn) btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
        }

        function drapoToggleTheme() {
            var current = document.documentElement.getAttribute('data-theme') || 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('drapo-docs-theme', next);
            drapoApplyThemeUI(next);
        }

        window.addEventListener('DOMContentLoaded', function () {
            drapoApplyThemeUI(document.documentElement.getAttribute('data-theme') || 'light');
        });
    </script>
    <title>Drapo</title>
</head>
<body>
    <!--Data-->
    <div d-dataKey="errors" d-dataType="array"></div>
    <div d-dataKey="systemClipboard" d-dataType="value"></div>
    <div d-dataKey="querystring" d-dataType="querystring"></div>
    <div d-dataKey="menuItems" d-dataUrlGet="/api/Menu/GetItems"></div>
    <!--Windows-->
    <div d-id="windows" d-sector="windows" class="dSectorWindows" d-on-body-keyup-escape="CloseWindow()"></div>
    <!--Header-->
    <div d-sector="header" d-route="false" d-sector-url="/app/shared/header.html" class="dSectorHeader"></div>
    <div class="doc">
        <!--Menu-->
        <div d-sector="menu" d-route="false" d-sector-url="/app/shared/menu.html" class="docLeft dSectorMenu"></div>
        <!--Content-->
        <div d-sector="content" class="docRight dSectorContent"></div>
    </div>
    <!--Footer-->
    <div d-sector="footer" d-route="false" d-sector-url="/app/shared/footer.html" class="dSectorFooter"></div>
    <!--Initialize-->
    <div d-dataKey="initialize" d-dataType="function" d-dataLoadType="startup" d-dataValue="IF({{querystring.w}},ExecuteDataItem({{item.Action}},item in menuItems,{{item.Name}}={{querystring.w}},false,item in item.Items))"></div>
</body>
</html>
