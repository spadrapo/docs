<!DOCTYPE html>
<html>
<head>
    <script src="/drapo.js"></script>
    <title>Function - GetExternalFrame</title>
</head>
<body>
    <br>
    <span>GetExternalFrame</span>
    <iframe id="childFrame" src="~/app/data/ExternalFrameChild.html" style="width:1px;height:1px;border:0;"></iframe>
    <div d-dataKey="received" d-dataType="array"></div>
    <div>
        <input type="button" value="Get from frame" d-on-click="GetExternalFrame(childFrame,getRows,received)">
        <ul>
            <li d-for="row in received">{{row.name}}</li>
        </ul>
    </div>
</body>
</html>
