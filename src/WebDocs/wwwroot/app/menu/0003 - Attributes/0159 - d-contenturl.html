<!DOCTYPE html>
<script src="/drapo.js"></script>
<div>
    <div>
        <h2>d-contenturl</h2>
        <p>You can use d-contenturl on an element to load its inner content from a URL.</p>
        <h4>Example</h4>
        <d-code>
            &lt;div d-contenturl="~/app/parts/panel.html"&gt;&lt;/div&gt;
        </d-code>
    </div>
</div>
