<!DOCTYPE html>
<script src="/drapo.js"></script>
<div>
    <div>
        <h2>d-contenturl</h2>
        <p>You can use d-contenturl on a component element to load its content/template from a URL.</p>
        <h4>Example</h4>
        <d-code>
            &lt;d-panel d-contenturl="~/app/parts/panel.html"&gt;&lt;/d-panel&gt;
        </d-code>
    </div>
</div>
