<!DOCTYPE html>
<script src="/drapo.js"></script>
<div>
    <div>
        <h2>d-template</h2>
        <p>You can use d-template to provide an inline template used when rendering a sector or element.</p>
        <h4>Example</h4>
        <d-code>
            &lt;div d-sector="list" d-template="~/app/parts/row.html"&gt;&lt;/div&gt;
        </d-code>
    </div>
</div>
