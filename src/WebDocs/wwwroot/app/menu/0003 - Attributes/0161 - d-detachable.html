<!DOCTYPE html>
<script src="/drapo.js"></script>
<div>
    <div>
        <h2>d-detachable</h2>
        <p>You can use d-detachable="false" to prevent an element (and its subtree) from being detached and preserved when a sector swaps its content, forcing that part to be recreated instead. Elements are detachable by default.</p>
        <h4>Example</h4>
        <d-code>
            &lt;div d-detachable="false"&gt;...&lt;/div&gt;
        </d-code>
    </div>
</div>
